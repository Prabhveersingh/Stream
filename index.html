<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omega Stream - Strong Proxy</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial; text-align:center; }
    #status { padding:30px; font-size:24px; }
    video { width:100vw; height:90vh; object-fit:cover; }
  </style>
</head>
<body>
  <div id="status">Loading... (Strong proxy active). Wait 20-40 sec. If spinner, server slow/down.</div>
  <video id="video" controls autoplay playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');

    // Stronger proxy for Vercel HTTPS
    const proxy = 'https://thingproxy.freeboard.io/fetch/';
    const stream = 'http://103.229.254.25:7001/play/a0db/index.m3u8';
    const proxied = proxy + stream;

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(proxied);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        status.textContent = 'Stream parsed! Playing... 🔥';
        video.play().catch(e => status.textContent = 'Autoplay blocked: ' + e.message);
      });
      hls.on(Hls.Events.ERROR, (event, data) => {
        status.textContent = `Error: ${data.type} - ${data.details}`;
        console.log('HLS Error:', data);
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = proxied;
      video.addEventListener('loadedmetadata', () => {
        status.textContent = 'Native HLS via proxy - playing!';
        video.play();
      });
    } else {
      status.textContent = 'No HLS support. Use VLC or MX Player.';
    }
  </script>
</body>
</html>
