<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omega M3U8 Stream Fix</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial; text-align:center; }
    #status { padding:20px; font-size:20px; }
    video { width:100vw; height:80vh; object-fit:cover; }
  </style>
</head>
<body>
  <div id="status">Loading... Wait 10-20 sec. If black + spinner, try VLC or local server.</div>
  <video id="video" controls autoplay playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const streamUrl = 'http://103.229.254.25:7001/play/a0db/index.m3u8';

    if (Hls.isSupported()) {
      const hls = new Hls({
        enableWorker: false,  // for mobile performance
        lowLatencyMode: true  // for live streams
      });
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        status.textContent = 'Stream loaded! Playing...';
        video.play();
      });
      hls.on(Hls.Events.LEVEL_LOADED, () => {
        status.textContent = 'Segments loading...';
      });
      hls.on(Hls.Events.ERROR, (event, data) => {
        status.textContent = `Error: ${data.type} - ${data.details}`;
        console.log('HLS Error:', data);
        if (data.fatal) {
          hls.destroy();
          status.textContent += ' - Try VLC or local server.';
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamUrl;
      video.addEventListener('loadedmetadata', () => {
        status.textContent = 'Native HLS - playing!';
        video.play();
      });
      video.addEventListener('error', (e) => {
        status.textContent = 'Native error: ' + e.message;
      });
    } else {
      status.textContent = 'Browser no HLS support. Use VLC.';
    }
  </script>
</body>
</html>
