<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omega Stream Test</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial; text-align:center; }
    #status { padding:20px; font-size:20px; }
    video { width:100vw; height:80vh; object-fit:cover; }
  </style>
</head>
<body>
  <div id="status">Loading stream... (HTTPS proxy via allorigins)</div>
  <video id="video" controls autoplay playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');

    // Proxy to bypass mixed content (HTTP on HTTPS page)
    const proxy = 'https://api.allorigins.win/raw?url=';
    const streamUrl = 'http://103.229.254.25:7001/play/a0db/index.m3u8';
    const proxiedUrl = proxy + encodeURIComponent(streamUrl);

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(proxiedUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        status.textContent = 'Stream loaded via proxy! Playing...';
        video.play();
      });
      hls.on(Hls.Events.ERROR, (event, data) => {
        status.textContent = `Error: ${data.type} - ${data.details}`;
        console.log('HLS Error:', data);
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = proxiedUrl;
      video.addEventListener('loadedmetadata', () => {
        status.textContent = 'Native HLS via proxy - playing!';
        video.play();
      });
    } else {
      status.textContent = 'No HLS support. Try VLC.';
    }
  </script>
</body>
</html>
