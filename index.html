<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omega Stream - Video.js</title>
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <style>
    body { margin:0; background:#000; }
    #status { color:#fff; text-align:center; padding:20px; font-size:20px; }
  </style>
</head>
<body>
  <div id="status">Loading... (Video.js player)</div>

  <video
    id="my-video"
    class="video-js"
    controls
    preload="auto"
    width="100%"
    height="auto"
    data-setup='{}'>
  </video>

  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-hls/5.15.0/videojs-contrib-hls.min.js"></script>
  <script>
    const player = videojs('my-video');
    const status = document.getElementById('status');

    player.src({
      src: 'http://103.229.254.25:7001/play/a0db/index.m3u8',
      type: 'application/x-mpegURL'
    });

    player.ready(() => {
      status.textContent = 'Player ready! Trying to play...';
      player.play().catch(e => {
        status.textContent = 'Play error: ' + e.message + ' - Try local server or VLC.';
      });
    });

    player.on('error', () => {
      status.textContent = 'Player error: ' + player.error().message;
    });
  </script>
</body>
</html>
